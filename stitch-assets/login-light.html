<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Vantage Deep Work Ecosystem</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&amp;family=Work+Sans:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface-variant": "#4b5563",
                    "on-error": "#ffffff",
                    "on-tertiary-fixed": "#00201d",
                    "surface-container-high": "#e7e7f1",
                    "inverse-primary": "#b0c6ff",
                    "surface-container": "#ededf6",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed": "#410006",
                    "on-primary": "#ffffff",
                    "primary-container": "#0f52ba",
                    "tertiary-container": "#1e625b",
                    "error-container": "#ffdad6",
                    "surface-variant": "#e1e2eb",
                    "surface": "#faf8ff",
                    "primary-fixed-dim": "#b0c6ff",
                    "outline-variant": "#d1d5db",
                    "background": "#faf8ff",
                    "surface-bright": "#faf8ff",
                    "on-error-container": "#93000a",
                    "on-surface": "#191b22",
                    "secondary-fixed": "#ffdad8",
                    "tertiary-fixed-dim": "#92d2c9",
                    "primary-fixed": "#d9e2ff",
                    "secondary-container": "#ff6b6b",
                    "on-primary-container": "#bcceff",
                    "tertiary": "#004a43",
                    "on-secondary-container": "#6d0011",
                    "surface-dim": "#d9d9e2",
                    "tertiary-fixed": "#aeefe5",
                    "secondary": "#ae2f34",
                    "surface-container-highest": "#e1e2eb",
                    "primary": "#003c90",
                    "error": "#ba1a1a",
                    "inverse-surface": "#2e3037",
                    "on-background": "#191b22",
                    "inverse-on-surface": "#f0f0f9",
                    "on-tertiary-container": "#9adbd2",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed-dim": "#ffb3b0",
                    "on-secondary": "#ffffff",
                    "on-secondary-fixed-variant": "#8c1520",
                    "surface-container-low": "#f3f3fc",
                    "on-primary-fixed": "#001945",
                    "surface-tint": "#1d59c1",
                    "on-tertiary-fixed-variant": "#00504a",
                    "on-primary-fixed-variant": "#00419c",
                    "outline": "#737784"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "lg": "40px",
                    "container-max": "1440px",
                    "sm": "16px",
                    "base": "4px",
                    "xs": "8px",
                    "xl": "64px",
                    "md": "24px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "body-md": ["Montserrat"],
                    "body-sm": ["Montserrat"],
                    "headline-sm": ["Work Sans"],
                    "body-lg": ["Montserrat"],
                    "headline-md": ["Work Sans"],
                    "label-md": ["Montserrat"],
                    "display-lg": ["Work Sans"],
                    "headline-lg": ["Work Sans"]
            }
          }
        }
      }
    </script>
<style>
        .glass-sidebar {
            backdrop-filter: blur(24px);
            background-color: rgba(255, 255, 255, 0.3);
            border-right: 1px solid rgba(209, 213, 219, 0.3);
        }
        
        .bento-card {
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .auth-card {
            background-color: #ededf6; /* surface-container */
            border: 1px solid rgba(209, 213, 219, 0.3);
        }

        .btn-hover-active:active {
            transform: scale(0.98);
        }

        .glow-bg {
            background: radial-gradient(circle at 50% 50%, rgba(15, 82, 186, 0.08) 0%, transparent 70%);
        }

        input:focus {
            outline: none;
            border-color: #003c90 !important;
            background-color: #ffffff !important;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Ambient Glow Effects -->
<div class="absolute top-0 left-0 w-full h-full glow-bg pointer-events-none"></div>
<div class="absolute -top-[10%] -right-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<main class="relative z-10 w-full max-w-[440px] px-sm">
<!-- MEGA Glyph Logo & Branding -->
<div class="flex flex-col items-center mb-md">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center shadow-lg mb-xs">
<span class="material-symbols-outlined text-white text-[40px]" style="font-variation-settings: 'FILL' 1;">
                    bolt
                </span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tighter">Vantage</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Deep Work Ecosystem</p>
</div>
<!-- Login Card -->
<div class="auth-card rounded-xl p-md shadow-sm">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-md">Sign In</h2>
<form class="space-y-sm">
<!-- Email Field -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">EMAIL ADDRESS</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">mail</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-outline-variant bg-surface-container-low font-body-md transition-all" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-base">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">PASSWORD</label>
<a class="text-[12px] font-semibold text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">lock</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-outline-variant bg-surface-container-low font-body-md transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-white py-3 rounded-lg font-semibold font-body-md btn-hover-active hover:bg-primary transition-colors mt-base" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="flex items-center my-md">
<div class="flex-grow border-t border-outline-variant/50"></div>
<span class="px-3 font-label-md text-label-md text-on-surface-variant">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-outline-variant/50"></div>
</div>
<!-- Social Options -->
<div class="grid grid-cols-2 gap-sm">
<button class="flex items-center justify-center gap-xs bg-white border border-outline-variant py-2.5 rounded-lg font-body-sm text-on-surface hover:bg-surface-container-lowest transition-colors btn-hover-active">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
                    Google
                </button>
<button class="flex items-center justify-center gap-xs bg-white border border-outline-variant py-2.5 rounded-lg font-body-sm text-on-surface hover:bg-surface-container-lowest transition-colors btn-hover-active">
<span class="material-symbols-outlined text-[20px] text-primary">magic_button</span>
                    Magic Link
                </button>
</div>
</div>
<!-- Create Account Footer -->
<div class="mt-md text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-semibold hover:underline" href="#">Create one</a>
</p>
</div>
</main>
<!-- Global Footer -->
<footer class="mt-xl py-md w-full border-t border-outline-variant/20 flex flex-col md:flex-row items-center justify-center gap-md">
<div class="flex gap-md">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">System Status</a>
</div>
<p class="font-label-md text-label-md text-on-surface-variant/60">© 2024 Vantage Ecosystem. Built for Deep Work.</p>
</footer>
<!-- Interactive Layer -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.parentElement.classList.add('scale-[1.01]');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.parentElement.classList.remove('scale-[1.01]');
                });
            });
        });
    </script>
</body></html>
